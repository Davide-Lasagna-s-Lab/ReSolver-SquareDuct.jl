<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 280" role="img" aria-labelledby="title desc">
  <title id="title">ReSolverSquareDuct.jl logo</title>
  <desc id="desc">Axial-velocity isocountour lines in a square duct cross-section with the ReSolverSquareDuct.jl wordmark.</desc>
  <defs>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f6f8fb"/>
    </linearGradient>
    <linearGradient id="duct-bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#edf2f7"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#172033" flood-opacity="0.14"/>
    </filter>
  </defs>

  <!-- Main background panel -->
  <rect x="24" y="24" width="912" height="232" rx="28" fill="url(#panel)" filter="url(#shadow)"/>

  <!-- Left illustration: square duct cross-section (x–y plane) -->
  <g transform="translate(72 54)">
    <!-- Duct walls -->
    <rect x="0" y="0" width="172" height="172" rx="10"
          fill="url(#duct-bg)" stroke="#2f3441" stroke-width="8"/>

    <!-- Axial-velocity isocountours: concentric rounded squares.
         Outermost = low velocity (near walls), innermost = peak velocity.
         Colors follow the Julia palette. -->
    <rect x="14" y="14" width="144" height="144" rx="30"
          fill="none" stroke="#389826" stroke-width="5.5" opacity="0.88"/>
    <rect x="30" y="30" width="112" height="112" rx="23"
          fill="none" stroke="#9558b2" stroke-width="5.5" opacity="0.88"/>
    <rect x="46" y="46" width="80"  height="80"  rx="16"
          fill="none" stroke="#cb3c33" stroke-width="5.5" opacity="0.88"/>
    <rect x="62" y="62" width="48"  height="48"  rx="10"
          fill="none" stroke="#4063d8" stroke-width="5.5" opacity="0.88"/>
    <!-- Peak-velocity core -->
    <rect x="76" y="76" width="20"  height="20"  rx="5"
          fill="#4063d8" opacity="0.72"/>
  </g>

  <!-- Right: wordmark and subtitle -->
  <g transform="translate(290 76)">
    <text x="0" y="48"
          font-family="Inter, Avenir, Helvetica, Arial, sans-serif"
          font-size="42" font-weight="800" fill="#242936" letter-spacing="0">ReSolverSquareDuct.jl</text>
    <text x="2" y="88"
          font-family="Inter, Avenir, Helvetica, Arial, sans-serif"
          font-size="22" font-weight="600" fill="#5c6475" letter-spacing="0">square-duct cross-section grids and operators</text>
    <text x="2" y="118"
          font-family="Inter, Avenir, Helvetica, Arial, sans-serif"
          font-size="22" font-weight="600" fill="#5c6475" letter-spacing="0">for ReSolver.jl and NSEBase.jl</text>
  </g>
</svg>
